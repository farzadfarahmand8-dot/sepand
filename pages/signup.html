<!doctype html>


<html dir="rtl" 1rem="">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../output.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet"
        type="text/css" />
</head>

<body
    class="[font-family:Vazirmatn,sans-serif] min-h-screen bg-gradient-to-b from-[#40464b] via-[#24282c] to-[#111315] flex flex-col overflow-hidden">

    <!-- نورهای پس زمینه -->
    <div class="fixed top-0 left-0 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl"></div>
    <div class="fixed bottom-0 right-0 w-96 h-96 bg-white/5 rounded-full blur-3xl"></div>

    <!-- لوگو -->
    <div class="flex justify-center pt-8 z-10">
        <img class="h-[90px] w-auto"
            src="https://theme30.mywebzi.ir/uploads/4e4bf668a50b424996da38c17fe15a74.w_198,h_53,r_k.png.webp"
            alt="Logo">
    </div>

    <!-- بخش اصلی -->
    <div class="flex-1 flex justify-center items-center px-4 z-10">

        <!-- کارت -->
        <div class="relative w-full max-w-md p-8 overflow-hidden

            bg-white/[0.08]
            backdrop-blur-[35px]

            border border-white/20

            rounded-tl-[80px]
            rounded-br-[80px]
            rounded-tr-2xl
            rounded-bl-2xl

            shadow-[inset_0_1px_1px_rgba(255,255,255,0.35),0_15px_40px_rgba(0,0,0,0.4)]">

            <!-- نور داخلی بالا -->
            <div class="absolute -top-32 left-1/2 -translate-x-1/2 w-96 h-40 bg-white/15 blur-3xl">
            </div>

            <!-- نور داخلی راست -->
            <div class="absolute -right-20 top-10 w-40 h-40 bg-cyan-300/10 rounded-full blur-3xl">
            </div>

            <div class="relative z-10">

                <h1 class="text-center text-4xl font-bold text-white mb-8">
                    ثبت نام
                </h1>

                <!-- شماره -->
                <div class="mb-5">
                    <label class="block text-gray-200 mb-2 text-lg">
                        ایمیل / شماره تلفن
                    </label>

                    <input type="text" dir="ltr" placeholder="09xxxxxxxxx" class="w-full px-5 py-3

                        bg-black/20
                        backdrop-blur-xl

                        border border-white/10

                        rounded-tl-3xl
                        rounded-br-3xl

                        text-white
                        placeholder:text-gray-400

                        focus:outline-none
                        focus:border-cyan-400/50
                        focus:bg-black/30

                        transition-all duration-300">
                </div>

                <!-- رمز -->
                <div class="mb-5">
                    <label class="block text-gray-200 mb-2 text-lg">
                        کلمه عبور
                    </label>

                    <input id="password" type="password" dir="ltr" placeholder="********" class="w-full px-5 py-3

        bg-black/20
        backdrop-blur-xl

        border border-white/10

        rounded-tl-3xl
        rounded-br-3xl

        text-white
        placeholder:text-gray-400

        focus:outline-none
        focus:border-cyan-400/50
        focus:bg-black/30

        transition-all duration-300">

                    <p id="password-error" class="mt-2 mr-2 text-sm text-rose-300 hidden">
                        رمز عبور باید حداقل ۸ کاراکتر داشته باشد.
                    </p>
                </div>
                <!-- تکرار رمز -->
                <div class="mb-5">
                    <label class="block text-gray-200 mb-2 text-lg">
                        تکرار کلمه عبور
                    </label>

                    <input id="confirm-password" type="password" dir="ltr" placeholder="********" class="w-full px-5 py-3

        bg-black/20
        backdrop-blur-xl

        border border-white/10

        rounded-tl-3xl
        rounded-br-3xl

        text-white
        placeholder:text-gray-400

        focus:outline-none
        focus:border-cyan-400/50
        focus:bg-black/30

        transition-all duration-300">

                    <p id="confirm-password-error" class="mt-2 mr-2 text-sm text-rose-300 hidden">
                        رمزهای عبور با یکدیگر مطابقت ندارند.
                    </p>
                </div>

                <!-- مرا به خاطر بسپار -->
                <div class="flex justify-center items-center gap-2 mb-6 text-gray-200">
                    <input type="checkbox" class="w-4 h-4 accent-cyan-400">
                    <span>
                        مرا به خاطر بسپار
                    </span>
                </div>

                <!-- دکمه -->
                <a href="../index.html">
                    <button class="w-full py-3

                    bg-gradient-to-r
                    from-cyan-400
                    to-teal-400

                    text-white
                    font-bold

                    rounded-tl-3xl
                    rounded-br-3xl

                    shadow-lg shadow-cyan-500/20

                    hover:scale-[1.02]
                    hover:shadow-cyan-500/40

                    transition-all duration-300">

                        ورود

                    </button>
                </a>
            </div>

        </div>

    </div>

    <!-- ثبت نام -->
    <div class="text-center pb-8 z-10">
        <a href="./login.html" class="text-cyan-300 hover:text-cyan-200 transition underline">
            حساب قبلی دارید؟ وارد شوید </a>
    </div>



    <script>
        const password = document.getElementById("password");
        const confirmPassword = document.getElementById("confirm-password");

        const passwordError = document.getElementById("password-error");
        const confirmPasswordError = document.getElementById("confirm-password-error");

        const submitBtn = document.querySelector("button");

        submitBtn.addEventListener("click", function (e) {

            let isValid = true;

            passwordError.classList.add("hidden");
            confirmPasswordError.classList.add("hidden");

            if (password.value.length < 8) {
                passwordError.classList.remove("hidden");
                isValid = false;
            }

            if (password.value !== confirmPassword.value) {
                confirmPasswordError.classList.remove("hidden");
                isValid = false;
            }

            if (!isValid) {
                e.preventDefault();
            }
        });
    </script>
</body>

</html>
